events {
    worker_connections 1024;
}

stream {
    upstream rabbitmq_backend {
        server rabbitmq:5672; # TODO HARD CODED PORT
    }

    server {
        listen 5672; # TODO HARD CODED PORT
        proxy_pass rabbitmq_backend;
    }
}

http {
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s; 

    upstream backend_servers {
        server backend:${BACKEND_PORT};
    }

    # upstream plugin_integration_servers {
    #     server plugin_integration_server:${PLUGIN_INTEGRATION_SERVER_PORT};
    # }

    server {
        listen 80;
        server_name localhost;

        location /docs {
            proxy_pass http://backend_servers;
        }

        location /api {
            proxy_pass http://backend_servers;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            client_max_body_size 200M;
        }

        # location /pis {
        #     rewrite ^/pis(/.*)$ $1 break;
        #     proxy_pass http://plugin_integration_servers;
        #     proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        # }

        # location /pis {
        #     rewrite ^/pis(/.*)$ $1 break;
        #     proxy_pass http://plugin_integration_server:${PLUGIN_INTEGRATION_SERVER_PORT};
        #     proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        # }

        location /dagster {
            proxy_pass http://dagster_webserver:${DAGSTER_WEBSERVER_PORT};
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }

        location /rabbitmq/ {
            proxy_pass http://rabbitmq:15672;
        }

        location /tei/ {
            set $tei_upstream "http://tei_plugin:${TEI_PORT}";
            rewrite ^/tei(/.*)$ $1 break;
            proxy_pass $tei_upstream;
            proxy_intercept_errors on;
            error_page 502 503 504 = @tei_unavailable;
        }

        location @tei_unavailable {
            return 503 '{"error": "TEI service unavailable"}';
            add_header Content-Type application/json;
        }

        location /qdrant/ {
            set $qdrant_upstream "http://qdrant:${QDRANT_PORT}";
            rewrite ^/qdrant(/.*)$ $1 break;
            proxy_pass $qdrant_upstream;
            proxy_intercept_errors on;
            error_page 502 503 504 = @qdrant_unavailable;
        }

        location @qdrant_unavailable {
            return 503 '{"error": "Qdrant service unavailable"}';
            add_header Content-Type application/json;
        }

        location /triton/ {
            set $triton_upstream "http://triton_plugin:${TRITON_HTTP_PORT}";
            rewrite ^/triton(/.*)$ $1 break;
            proxy_pass $triton_upstream;
            proxy_intercept_errors on;
            error_page 502 503 504 = @triton_unavailable;
        }

        location @triton_unavailable {
            return 503 '{"error": "Triton service unavailable"}';
            add_header Content-Type application/json;
        }
    }
}

