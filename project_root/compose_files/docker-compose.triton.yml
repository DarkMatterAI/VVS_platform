services:
  triton_plugin:
    build:
      context: ../triton_plugin 
      dockerfile: triton_plugin.Dockerfile 
    profiles: [plugin, triton_plugin]
    env_file:
      - ../.env
    shm_size: 2g
    ulimits:
      memlock: -1
      stack: 67108864
    networks:
      - vvs_v2_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${TRITON_DEVICE_ID}']
              capabilities: [gpu]
    ports:
      - ${TRITON_HTTP_PORT}:${TRITON_HTTP_PORT}
      - ${TRITON_METRICS_PORT}:${TRITON_METRICS_PORT}
    depends_on:
      - plugin_integration_server

