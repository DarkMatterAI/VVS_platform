services:
  rdkit_plugin:
    build:
      context: ../ 
      dockerfile: plugins/rdkit_plugin/rdkit_plugin.Dockerfile 
    profiles: [plugin, rdkit_plugin]
    env_file:
      - ../.env
    networks:
      - vvs_v2_network
    depends_on:
      - rabbitmq
    deploy:
      replicas: ${RDKIT_PLUGIN_REPLICAS:-${DEFAULT_REPLICAS}}