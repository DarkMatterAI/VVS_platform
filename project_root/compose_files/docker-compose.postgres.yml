services:
  postgresql:
    image: postgres:14
    container_name: postgresql
    command: >
      -c max_connections=300
      -c shared_buffers=256MB
    env_file: 
      - ../.env 
    networks:
      - vvs_v2_network
    # volumes:
    #    - ${POSTGRES_STORAGE}:/var/lib/postgresql/data
    ports:
      - "${PGPORT}:${PGPORT}"