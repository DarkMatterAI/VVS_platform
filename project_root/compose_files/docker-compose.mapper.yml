services:
  mapper_plugin:
    build:
      context: ../mapper_plugin 
      dockerfile: mapper_plugin.Dockerfile 
    profiles: [plugin, mapper_plugin]
    env_file:
      - ../.env
    shm_size: 2g
    ulimits:
      memlock: -1
      stack: 67108864
    networks:
      - vvs_v2_network
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"