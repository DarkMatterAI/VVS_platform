scheduler:
  module: dagster.core.scheduler
  class: DagsterDaemonScheduler

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 25
    # tag_concurrency_limits:
    #   - key: "operation"
    #     value: "example"
    #     limit: 5

run_launcher:
  module: dagster_docker
  class: DockerRunLauncher
  config:
    env_vars:
      - DEPLOY
      - BACKEND_API_STR
      - REDIS_HOST
      - REDIS_PORT
      - REDIS_PASSWORD
      - REDIS_DB
      - REDIS_MESSAGE_TTL
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_DB_TEST
      - PGPORT
      - RABBITMQ_HOST
      - RABBITMQ_PORT
      - RABBITMQ_DEFAULT_USER
      - RABBITMQ_DEFAULT_PASS
      - RABBITMQ_EXCHANGE_NAME
      - MINIO_API_PORT
      - S3_PROFILE_NAME
      - S3_REGION
      - S3_USE_SSL
      - S3_VERIFY_SSL
      - S3_ACCESS_KEY
      - S3_SECRET_KEY
      - S3_SESSION_TOKEN
      - S3_BUCKET
      - S3_UPLOAD_PREFIX
      - S3_URL
    network: vvs_v2_network
    container_kwargs:
      auto_remove: True
      volumes: # Make docker client accessible to any launched containers as well
        - /var/run/docker.sock:/var/run/docker.sock
        - /tmp/io_manager_storage:/tmp/io_manager_storage

run_monitoring:
  enabled: true
  start_timeout_seconds: 20
  cancel_timeout_seconds: 180
  max_resume_run_attempts: 3
  poll_interval_seconds: 60

run_storage:
  module: dagster_postgres.run_storage
  class: PostgresRunStorage
  config:
    postgres_db:
      hostname: postgresql
      username:
        env: POSTGRES_USER
      password:
        env: POSTGRES_PASSWORD
      db_name:
        env: POSTGRES_DB
      port:
        env: PGPORT

schedule_storage:
  module: dagster_postgres.schedule_storage
  class: PostgresScheduleStorage
  config:
    postgres_db:
      hostname: postgresql
      username:
        env: POSTGRES_USER
      password:
        env: POSTGRES_PASSWORD
      db_name:
        env: POSTGRES_DB
      port:
        env: PGPORT

event_log_storage:
  module: dagster_postgres.event_log
  class: PostgresEventLogStorage
  config:
    postgres_db:
      hostname: postgresql
      username:
        env: POSTGRES_USER
      password:
        env: POSTGRES_PASSWORD
      db_name:
        env: POSTGRES_DB
      port:
        env: PGPORT